name: Update README with Blog Posts

on:
  schedule:
    - cron: "0 */48 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://exyone.is-a.dev/feed.xml"
          max_post_count: 5
          template: |
            <!-- BLOG-POST-LIST:START -->
            {{#each posts}}
            - [{{title}}]({{url}})
            {{/each}}
            <!-- BLOG-POST-LIST:END -->
